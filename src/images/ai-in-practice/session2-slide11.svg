<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="700" height="320" rx="12" fill="#f8f7f4"/>

  <!-- Agent (CENTER): 220px wide, centered at x=350 -->
  <rect x="240" y="134" width="220" height="62" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="2"/>
  <text x="350" y="162" text-anchor="middle" fill="#633806" font-size="16" font-weight="700">Agent</text>
  <text x="350" y="180" text-anchor="middle" fill="#854F0B" font-size="12" opacity="0.85">LLM + tools</text>

  <!-- Node 1: Receive task (TOP CENTER) — same width as side nodes (196px) -->
  <rect x="252" y="16" width="196" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.8"/>
  <text x="350" y="38" text-anchor="middle" fill="#0C447C" font-size="13" font-weight="700">Receive task</text>
  <text x="350" y="56" text-anchor="middle" fill="#378ADD" font-size="11" opacity="0.85">User describes the goal</text>

  <!-- Arrow Node1 → Agent -->
  <line x1="350" y1="68" x2="350" y2="128" stroke="#185FA5" stroke-width="1.5"/>
  <polygon points="346,128 350,136 354,128" fill="#185FA5"/>

  <!-- Node 2: Plan steps (RIGHT) — 196px wide -->
  <rect x="490" y="70" width="196" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.8"/>
  <text x="588" y="92" text-anchor="middle" fill="#3C3489" font-size="13" font-weight="700">Plan steps</text>
  <text x="588" y="110" text-anchor="middle" fill="#7F77DD" font-size="11" opacity="0.85">Break into sub-steps</text>

  <!-- Arrow Agent → Node2 (horizontal from right edge of agent to left edge of node2) -->
  <path d="M460 152 L475 152 L475 96 L484 96" fill="none" stroke="#534AB7" stroke-width="1.5"/>
  <polygon points="484,92 492,96 484,100" fill="#534AB7"/>

  <!-- Node 3: Execute tool (BOTTOM RIGHT) — 196px wide -->
  <rect x="490" y="196" width="196" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.8"/>
  <text x="588" y="218" text-anchor="middle" fill="#27500A" font-size="13" font-weight="700">Execute tool</text>
  <text x="588" y="236" text-anchor="middle" fill="#639922" font-size="11" opacity="0.85">Read / run / call API</text>

  <!-- Arrow Node2 → Node3 (vertical down) -->
  <line x1="588" y1="122" x2="588" y2="190" stroke="#3B6D11" stroke-width="1.5"/>
  <polygon points="584,190 588,198 592,190" fill="#3B6D11"/>

  <!-- Node 4: Check result (BOTTOM LEFT) — 196px wide -->
  <rect x="14" y="196" width="196" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.8"/>
  <text x="112" y="218" text-anchor="middle" fill="#085041" font-size="13" font-weight="700">Check result</text>
  <text x="112" y="236" text-anchor="middle" fill="#1D9E75" font-size="11" opacity="0.85">Did it work? Errors?</text>

  <!-- Arrow Node3 → Node4 (horizontal across bottom) -->
  <line x1="490" y1="222" x2="216" y2="222" stroke="#0F6E56" stroke-width="1.5"/>
  <polygon points="216,218 208,222 216,226" fill="#0F6E56"/>

  <!-- Node 5: Iterate or finish (TOP LEFT) — 196px wide, dashed -->
  <rect x="14" y="70" width="196" height="52" rx="8" fill="none" stroke="#BA7517" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text x="112" y="92" text-anchor="middle" fill="#854F0B" font-size="13" font-weight="700">Iterate or finish</text>
  <text x="112" y="110" text-anchor="middle" fill="#BA7517" font-size="11" opacity="0.85">Loop back or done</text>

  <!-- Arrow Node4 → Node5 (vertical up) -->
  <line x1="112" y1="196" x2="112" y2="128" stroke="#BA7517" stroke-width="1.5"/>
  <polygon points="108,128 112,120 116,128" fill="#BA7517"/>

  <!-- Arrow Node5 → Agent (horizontal from right edge of node5 to left edge of agent) -->
  <path d="M210 96 L225 96 L225 158 L234 158" fill="none" stroke="#BA7517" stroke-width="1.5"/>
  <polygon points="234,154 242,158 234,162" fill="#BA7517"/>

  <!-- Caption -->
  <text x="350" y="302" text-anchor="middle" fill="#5F5E5A" font-size="12">Agents loop autonomously — plan → act → observe → repeat — until the task is done.</text>
</svg>
