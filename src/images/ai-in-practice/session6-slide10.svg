<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="700" height="260" fill="#f8f7f4" rx="12"/>

  <!-- LEFT PANEL: Copilot Agent Mode (blue) -->
  <rect x="14" y="14" width="310" height="218" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>

  <!-- VS Code window icon -->
  <rect x="130" y="24" width="78" height="52" rx="5" fill="#f8f7f4" stroke="#85B7EB" stroke-width="1"/>
  <rect x="130" y="24" width="78" height="12" rx="5" fill="#B5D4F4"/>
  <rect x="130" y="30" width="78" height="6" rx="0" fill="#B5D4F4"/>
  <circle cx="136" cy="30" r="2" fill="#E24B4A" fill-opacity="0.7"/>
  <circle cx="143" cy="30" r="2" fill="#EF9F27" fill-opacity="0.7"/>
  <circle cx="150" cy="30" r="2" fill="#639922" fill-opacity="0.7"/>
  <line x1="135" y1="43" x2="196" y2="43" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="135" y1="51" x2="185" y2="51" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="135" y1="59" x2="192" y2="59" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>

  <text x="169" y="94" text-anchor="middle" fill="#0C447C" font-size="15" font-weight="700">Copilot Agent Mode</text>

  <text x="28" y="118" fill="#5F5E5A" font-size="12" font-weight="700">Location:</text>
  <text x="110" y="118" fill="#444441" font-size="12">Lives inside VS Code</text>
  <text x="28" y="136" fill="#5F5E5A" font-size="12" font-weight="700">Scope:</text>
  <text x="110" y="136" fill="#444441" font-size="12">Current workspace files</text>
  <text x="28" y="154" fill="#5F5E5A" font-size="12" font-weight="700">Approval:</text>
  <text x="110" y="154" fill="#444441" font-size="12">Shows diff, you approve</text>
  <text x="28" y="172" fill="#5F5E5A" font-size="12" font-weight="700">Models:</text>
  <text x="110" y="172" fill="#444441" font-size="12">Claude, GPT-4o, o1</text>
  <text x="28" y="190" fill="#5F5E5A" font-size="12" font-weight="700">Best for:</text>
  <text x="110" y="190" fill="#444441" font-size="12">Focused IDE coding tasks</text>

  <!-- RIGHT PANEL: Terminal Agents (amber) -->
  <rect x="376" y="14" width="310" height="218" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>

  <!-- Terminal window icon -->
  <rect x="492" y="24" width="78" height="52" rx="5" fill="#f8f7f4" stroke="#EF9F27" stroke-width="1"/>
  <rect x="492" y="24" width="78" height="12" rx="5" fill="#FAC775"/>
  <rect x="492" y="30" width="78" height="6" rx="0" fill="#FAC775"/>
  <circle cx="498" cy="30" r="2" fill="#E24B4A" fill-opacity="0.7"/>
  <circle cx="505" cy="30" r="2" fill="#EF9F27" fill-opacity="0.7"/>
  <circle cx="512" cy="30" r="2" fill="#639922" fill-opacity="0.7"/>
  <text x="497" y="48" fill="#3B6D11" font-size="11">$ claude</text>
  <text x="497" y="60" fill="#BA7517" font-size="11">▆</text>

  <text x="531" y="94" text-anchor="middle" fill="#633806" font-size="15" font-weight="700">Terminal Agents</text>
  <text x="531" y="110" text-anchor="middle" fill="#854F0B" font-size="12" font-style="italic">(Claude Code / Opencode)</text>

  <text x="390" y="132" fill="#5F5E5A" font-size="12" font-weight="700">Location:</text>
  <text x="472" y="132" fill="#444441" font-size="12">Lives in your terminal</text>
  <text x="390" y="150" fill="#5F5E5A" font-size="12" font-weight="700">Scope:</text>
  <text x="472" y="150" fill="#444441" font-size="12">Entire repo + shell cmds</text>
  <text x="390" y="168" fill="#5F5E5A" font-size="12" font-weight="700">Approval:</text>
  <text x="472" y="168" fill="#444441" font-size="12">Confirms edits + commands</text>
  <text x="390" y="186" fill="#5F5E5A" font-size="12" font-weight="700">Models:</text>
  <text x="472" y="186" fill="#444441" font-size="12">Claude (direct billing)</text>
  <text x="390" y="204" fill="#5F5E5A" font-size="12" font-weight="700">Best for:</text>
  <text x="472" y="204" fill="#444441" font-size="12">Multi-file, complex tasks</text>

  <!-- Center label -->
  <rect x="310" y="105" width="70" height="32" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="345" y="125" text-anchor="middle" fill="#444441" font-size="12" font-weight="700">BOTH</text>

  <!-- Bottom caption -->
  <text x="350" y="248" text-anchor="middle" fill="#5F5E5A" font-size="12">Both use AI agents — different interface, different scope</text>
</svg>
