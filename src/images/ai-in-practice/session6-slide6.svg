<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="700" height="440" fill="#f8f7f4" rx="12"/>

  <!-- Step 1: You describe the task -->
  <rect x="180" y="16" width="340" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="350" y="34" text-anchor="middle" fill="#0C447C" font-size="14" font-weight="700">You describe the task</text>
  <text x="350" y="51" text-anchor="middle" fill="#378ADD" font-size="11">Add login tests for all three roles</text>

  <!-- Arrow down -->
  <line x1="350" y1="60" x2="350" y2="78" stroke="#888780" stroke-width="1.5"/>
  <polygon points="346,78 350,86 354,78" fill="#888780"/>

  <!-- Step 2: Agent analyses -->
  <rect x="180" y="88" width="340" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="350" y="106" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="700">Agent analyses the codebase</text>
  <text x="350" y="123" text-anchor="middle" fill="#7F77DD" font-size="11">Reads tests, finds patterns, plans</text>

  <!-- Arrow down -->
  <line x1="350" y1="132" x2="350" y2="150" stroke="#888780" stroke-width="1.5"/>
  <polygon points="346,150 350,158 354,150" fill="#888780"/>

  <!-- Step 3: Agent proposes -->
  <rect x="180" y="160" width="340" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="350" y="178" text-anchor="middle" fill="#633806" font-size="14" font-weight="700">Agent proposes changes</text>
  <text x="350" y="195" text-anchor="middle" fill="#BA7517" font-size="11">Shows diff of what it'll create / modify</text>

  <!-- Arrow down -->
  <line x1="350" y1="204" x2="350" y2="222" stroke="#888780" stroke-width="1.5"/>
  <polygon points="346,222 350,230 354,222" fill="#888780"/>

  <!-- Decision: You approve? -->
  <rect x="180" y="232" width="340" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="350" y="258" text-anchor="middle" fill="#633806" font-size="13" font-weight="700">You approve?</text>

  <!-- YES arrow down -->
  <line x1="350" y1="276" x2="350" y2="294" stroke="#3B6D11" stroke-width="1.5"/>
  <polygon points="346,294 350,302 354,294" fill="#3B6D11"/>
  <text x="364" y="290" fill="#3B6D11" font-size="11" font-weight="700">YES</text>

  <!-- NO arrow left -->
  <line x1="180" y1="254" x2="142" y2="254" stroke="#A32D2D" stroke-width="1.5"/>
  <polygon points="142,250 134,254 142,258" fill="#A32D2D"/>
  <text x="161" y="246" text-anchor="middle" fill="#A32D2D" font-size="11" font-weight="700">NO</text>

  <!-- You redirect (left side) -->
  <rect x="14" y="234" width="118" height="40" rx="8" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="73" y="251" text-anchor="middle" fill="#791F1F" font-size="12" font-weight="600">You redirect</text>
  <text x="73" y="266" text-anchor="middle" fill="#A32D2D" font-size="10">New instructions</text>

  <!-- Redirect loops back up to step 2 -->
  <path d="M73 234 L73 110 L178 110" fill="none" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="174,106 182,110 174,114" fill="#A32D2D"/>

  <!-- Changes applied -->
  <rect x="180" y="304" width="340" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="350" y="322" text-anchor="middle" fill="#27500A" font-size="14" font-weight="700">Changes applied</text>
  <text x="350" y="339" text-anchor="middle" fill="#639922" font-size="11">Files created / edited</text>

  <!-- Arrow down -->
  <line x1="350" y1="348" x2="350" y2="366" stroke="#888780" stroke-width="1.5"/>
  <polygon points="346,366 350,374 354,366" fill="#888780"/>

  <!-- Done? decision -->
  <rect x="180" y="376" width="340" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.2"/>
  <text x="350" y="402" text-anchor="middle" fill="#27500A" font-size="13" font-weight="700">Task done?</text>

  <!-- YES arrow left → Done -->
  <line x1="180" y1="398" x2="136" y2="398" stroke="#3B6D11" stroke-width="1.5"/>
  <polygon points="136,394 128,398 136,402" fill="#3B6D11"/>
  <text x="158" y="390" text-anchor="middle" fill="#3B6D11" font-size="11" font-weight="700">YES</text>

  <rect x="40" y="382" width="86" height="32" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="83" y="402" text-anchor="middle" fill="#27500A" font-size="14" font-weight="700">Done</text>

  <!-- NO arrow right, short loop back up to step 2 -->
  <line x1="520" y1="398" x2="558" y2="398" stroke="#A32D2D" stroke-width="1.5"/>
  <polygon points="558,394 566,398 558,402" fill="#A32D2D"/>
  <text x="539" y="390" text-anchor="middle" fill="#A32D2D" font-size="10" font-weight="700">NO</text>

  <path d="M566 398 L600 398 L600 110 L522 110" fill="none" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="526,106 518,110 526,114" fill="#A32D2D"/>
  <text x="614" y="260" text-anchor="middle" fill="#A32D2D" font-size="10" transform="rotate(-90,614,260)">Next step →</text>
</svg>
