<svg viewBox="0 0 700 306" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="700" height="306" fill="#f8f7f4" rx="12"/>

  <!-- LEFT PANEL: Completions (amber) -->
  <rect x="14" y="14" width="304" height="258" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="166" y="38" text-anchor="middle" fill="#633806" font-size="16" font-weight="700">Inline Completions</text>

  <!-- Code editor mock -->
  <rect x="28" y="48" width="276" height="116" rx="6" fill="#1e1c2e" stroke="#BA7517" stroke-opacity="0.3" stroke-width="1"/>
  <text x="40" y="68" fill="#c0c8e8" font-size="11.5">async function login(page) {</text>
  <text x="40" y="84" fill="#c0c8e8" font-size="11.5">  await page.goto('/login');</text>

  <rect x="34" y="88" width="266" height="40" rx="4" fill="#e8a848" fill-opacity="0.08" stroke="#e8a848" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="44" y="106" fill="#606880" font-size="11.5" font-style="italic">  await page.fill('#email', email);</text>
  <text x="44" y="122" fill="#606880" font-size="11.5" font-style="italic">  await page.fill('#pass', pass);</text>

  <text x="40" y="144" fill="#c0c8e8" font-size="11.5">}</text>

  <text x="166" y="178" text-anchor="middle" fill="#BA7517" font-size="10" font-style="italic">↑ Ghost text = AI suggestion</text>
  <text x="166" y="191" text-anchor="middle" fill="#BA7517" font-size="10" font-style="italic">(greyed out until you accept)</text>

  <text x="166" y="212" text-anchor="middle" fill="#5F5E5A" font-size="12">Starts when you pause typing</text>

  <rect x="44" y="220" width="244" height="28" rx="6" fill="#FAC775" fill-opacity="0.3" stroke="#EF9F27" stroke-width="1"/>
  <text x="166" y="238" text-anchor="middle" fill="#633806" font-size="12">Tab to accept · Esc to dismiss</text>

  <!-- OR divider -->
  <text x="350" y="158" text-anchor="middle" fill="#888780" font-size="18" font-weight="700">OR</text>
  <line x1="350" y1="20" x2="350" y2="140" stroke="#D3D1C7" stroke-width="1"/>
  <line x1="350" y1="168" x2="350" y2="266" stroke="#D3D1C7" stroke-width="1"/>

  <!-- RIGHT PANEL: Chat (blue) -->
  <rect x="382" y="14" width="304" height="258" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="534" y="38" text-anchor="middle" fill="#0C447C" font-size="16" font-weight="700">Copilot Chat</text>

  <!-- Chat area background -->
  <rect x="392" y="46" width="284" height="132" rx="6" fill="#f8f7f4" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- You bubble 1 — right aligned -->
  <rect x="500" y="54" width="168" height="24" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="584" y="70" text-anchor="middle" fill="#633806" font-size="11">Why is this test flaky?</text>

  <!-- AI bubble 1 — left aligned -->
  <rect x="400" y="86" width="220" height="36" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="412" y="101" fill="#0C447C" font-size="11">The test fails when the</text>
  <text x="412" y="114" fill="#0C447C" font-size="11">network is slow because...</text>

  <!-- You bubble 2 — right aligned -->
  <rect x="528" y="130" width="140" height="24" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="598" y="146" text-anchor="middle" fill="#633806" font-size="11">How do I fix it?</text>

  <!-- Cursor blinking indicator -->
  <rect x="400" y="160" width="40" height="10" rx="5" fill="#85B7EB" fill-opacity="0.4"/>
  <circle cx="408" cy="165" r="2" fill="#378ADD"/>
  <circle cx="416" cy="165" r="2" fill="#378ADD"/>
  <circle cx="424" cy="165" r="2" fill="#378ADD"/>

  <!-- Trigger info -->
  <text x="534" y="212" text-anchor="middle" fill="#5F5E5A" font-size="12">You open the chat panel and type</text>

  <rect x="410" y="220" width="248" height="28" rx="6" fill="#B5D4F4" fill-opacity="0.3" stroke="#85B7EB" stroke-width="1"/>
  <text x="534" y="238" text-anchor="middle" fill="#0C447C" font-size="12">You ask a question, AI answers</text>

  <!-- Bottom note -->
  <text x="350" y="294" text-anchor="middle" fill="#5F5E5A" font-size="12">Both modes are available after installation — learn to use each for the right task</text>
</svg>
