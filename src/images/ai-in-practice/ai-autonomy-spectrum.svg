<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="700" height="220" rx="12" fill="#f8f7f4"/>

  <!-- Background gradient tint -->
  <rect x="40" y="82" width="310" height="44" rx="0" fill="#E24B4A" fill-opacity="0.04"/>
  <rect x="350" y="82" width="310" height="44" rx="0" fill="#639922" fill-opacity="0.04"/>

  <!-- Main spectrum bar -->
  <rect x="40" y="82" width="620" height="44" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1.5"/>

  <!-- All diamonds same size: 12px radius, centered at y=104 (bar center) -->
  <!-- x=70: Rule-Based Chatbot -->
  <polygon points="70,92 58,104 70,116 82,104" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>

  <!-- x=210: Retrieval System -->
  <polygon points="210,92 198,104 210,116 222,104" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>

  <!-- x=350: LLM Chat -->
  <polygon points="350,92 338,104 350,116 362,104" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>

  <!-- x=490: Copilot Agent Mode -->
  <polygon points="490,92 478,104 490,116 502,104" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>

  <!-- x=630: Autonomous Agent -->
  <polygon points="630,92 618,104 630,116 642,104" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>

  <!-- Scale labels BELOW the bar -->
  <text x="46" y="140" text-anchor="start" fill="#444441" font-size="11" font-weight="700">← Most constrained</text>
  <text x="654" y="140" text-anchor="end" fill="#444441" font-size="11" font-weight="700">Most autonomous →</text>

  <!-- Labels ABOVE the bar — spaced away from bar top (y=82) -->
  <line x1="70" y1="82" x2="70" y2="66" stroke="#A32D2D" stroke-width="1" stroke-opacity="0.5"/>
  <text x="70" y="58" text-anchor="middle" fill="#791F1F" font-size="12" font-weight="700">Rule-Based</text>
  <text x="70" y="44" text-anchor="middle" fill="#A32D2D" font-size="10" opacity="0.85">Chatbot</text>
  <text x="70" y="30" text-anchor="middle" fill="#A32D2D" font-size="10" opacity="0.7">Scripted only.</text>

  <line x1="350" y1="82" x2="350" y2="66" stroke="#854F0B" stroke-width="1" stroke-opacity="0.6"/>
  <text x="350" y="58" text-anchor="middle" fill="#633806" font-size="12" font-weight="700">LLM Chat</text>
  <text x="350" y="44" text-anchor="middle" fill="#854F0B" font-size="10" opacity="0.85">ChatGPT · Copilot Chat</text>
  <text x="350" y="30" text-anchor="middle" fill="#BA7517" font-size="10" opacity="0.8">Generates responses.</text>

  <line x1="630" y1="82" x2="630" y2="66" stroke="#3B6D11" stroke-width="1" stroke-opacity="0.6"/>
  <text x="630" y="58" text-anchor="middle" fill="#27500A" font-size="12" font-weight="700">Autonomous</text>
  <text x="630" y="44" text-anchor="middle" fill="#3B6D11" font-size="10" opacity="0.85">Agent</text>
  <text x="630" y="30" text-anchor="middle" fill="#639922" font-size="10" opacity="0.8">Plans, acts, loops.</text>

  <!-- Labels BELOW the scale labels — spaced away from bar bottom -->
  <line x1="210" y1="126" x2="210" y2="152" stroke="#185FA5" stroke-width="1" stroke-opacity="0.5"/>
  <text x="210" y="164" text-anchor="middle" fill="#0C447C" font-size="12" font-weight="700">Retrieval</text>
  <text x="210" y="178" text-anchor="middle" fill="#378ADD" font-size="10" opacity="0.85">System</text>
  <text x="210" y="192" text-anchor="middle" fill="#378ADD" font-size="10" opacity="0.7">Search + retrieve.</text>

  <line x1="490" y1="126" x2="490" y2="152" stroke="#534AB7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="490" y="164" text-anchor="middle" fill="#3C3489" font-size="12" font-weight="700">Copilot Agent</text>
  <text x="490" y="178" text-anchor="middle" fill="#7F77DD" font-size="10" opacity="0.85">Mode</text>
  <text x="490" y="192" text-anchor="middle" fill="#7F77DD" font-size="10" opacity="0.7">Makes changes. Needs approval.</text>

  <!-- Caption -->
  <text x="350" y="212" text-anchor="middle" fill="#5F5E5A" font-size="11">Each step right = more AI autonomy. Each step left = more human control.</text>
</svg>
