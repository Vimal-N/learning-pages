<svg viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="700" height="240" rx="12" fill="#f8f7f4"/>

  <!-- Horizontal timeline -->
  <line x1="50" y1="120" x2="668" y2="120" stroke="#D3D1C7" stroke-width="3"/>

  <!-- Node 1: Rule-Based x=60 — label ABOVE (gray) -->
  <circle cx="60" cy="120" r="8" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="2"/>
  <text x="60" y="58" text-anchor="middle" fill="#888780" font-size="11">1950s–80s</text>
  <text x="60" y="74" text-anchor="middle" fill="#444441" font-size="13" font-weight="700">Rule-Based</text>
  <text x="60" y="148" text-anchor="middle" fill="#888780" font-size="11">If-then expert</text>
  <text x="60" y="162" text-anchor="middle" fill="#888780" font-size="11">systems</text>

  <!-- Node 2: Statistical x=185 — label BELOW (blue) -->
  <circle cx="185" cy="120" r="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="2"/>
  <text x="185" y="148" text-anchor="middle" fill="#0C447C" font-size="13" font-weight="700">Statistical</text>
  <text x="185" y="164" text-anchor="middle" fill="#378ADD" font-size="11">1990s–2000s</text>
  <text x="185" y="180" text-anchor="middle" fill="#378ADD" font-size="11" opacity="0.85">Bayesian, n-grams</text>

  <!-- Node 3: Deep Learning x=310 — label ABOVE (blue) -->
  <circle cx="310" cy="120" r="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="2"/>
  <text x="310" y="58" text-anchor="middle" fill="#378ADD" font-size="11" opacity="0.85">Neural nets, GPUs</text>
  <text x="310" y="74" text-anchor="middle" fill="#378ADD" font-size="11">2012</text>
  <text x="310" y="90" text-anchor="middle" fill="#0C447C" font-size="13" font-weight="700">Deep Learning</text>

  <!-- Node 4: Transformer x=430 — label BELOW (purple) -->
  <circle cx="430" cy="120" r="8" fill="#CECBF6" stroke="#534AB7" stroke-width="2"/>
  <text x="430" y="148" text-anchor="middle" fill="#3C3489" font-size="13" font-weight="700">Transformer</text>
  <text x="430" y="164" text-anchor="middle" fill="#7F77DD" font-size="11">2017</text>
  <text x="430" y="180" text-anchor="middle" fill="#7F77DD" font-size="11" opacity="0.85">Attention mechanism</text>
  <text x="430" y="196" text-anchor="middle" fill="#7F77DD" font-size="11" opacity="0.85">— the breakthrough</text>

  <!-- Node 5: ChatGPT x=555 — label ABOVE, highlighted (amber) -->
  <circle cx="555" cy="120" r="10" fill="#FAC775" stroke="#854F0B" stroke-width="2.5"/>
  <text x="555" y="58" text-anchor="middle" fill="#BA7517" font-size="11" opacity="0.85">100M users · 60 days</text>
  <text x="555" y="74" text-anchor="middle" fill="#BA7517" font-size="11">Nov 2022</text>
  <text x="555" y="90" text-anchor="middle" fill="#633806" font-size="14" font-weight="700">ChatGPT</text>

  <!-- Node 6: Agents x=655 — label BELOW, highlighted (green) -->
  <circle cx="655" cy="120" r="10" fill="#C0DD97" stroke="#3B6D11" stroke-width="2.5"/>
  <text x="655" y="148" text-anchor="middle" fill="#27500A" font-size="14" font-weight="700">Agents</text>
  <text x="655" y="164" text-anchor="middle" fill="#639922" font-size="11">2024–25</text>
  <text x="655" y="180" text-anchor="middle" fill="#639922" font-size="11" opacity="0.85">AI takes actions,</text>
  <text x="655" y="196" text-anchor="middle" fill="#639922" font-size="11" opacity="0.85">not just answers</text>
</svg>
